services:
  # 1. The High-Performance Go Backend Engine
  - type: web
    name: lmq-go-backend
    env: go
    plan: free
    buildCommand: cd backend && go build -o main main.go
    startCommand: cd backend && ./main
    envVars:
      - key: PORT
        value: 8080
      - key: ALLOWED_ORIGINS
        value: "https://lmq.name.ng"
      - key: ADMIN_SECRET_HASH
        value: 2ebb0292b214a5e3ac93191f103abe949e8a257f53f79440c1eb2ac5c7a6d06b
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # 2. The SvelteKit Frontend User Interface
  - type: web
    name: lmq-svelte-frontend
    env: node
    plan: free
    buildCommand: cd frontend && pnpm install && pnpm build
    startCommand: cd frontend && node build/index.js
    envVars:
      - key: PORT
        value: 3000
      - key: PUBLIC_API_URL
        value: "https://api.lmq.name.ng/api/v1"
